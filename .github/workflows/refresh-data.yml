name: Refresh wiper price/stock from Cyberbiz

on:
  schedule:
    - cron: '0 22 * * *'   # 06:00 Taiwan (UTC+8)
    - cron: '0 4 * * *'    # 12:00 Taiwan
  workflow_dispatch: {}     # manual "Run workflow" button for ad-hoc daytime stock updates

permissions:
  contents: write

concurrency:
  group: refresh-data
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Re-fetch products + rebuild data.json
        run: |
          cd tools
          python fetch_products.py
          python build_data.py
      - name: Commit & push if changed
        run: |
          git config user.name "carmall-wiper-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data.json tools/wiper_products.json tools/promos.json
          if git diff --cached --quiet; then
            echo "No changes."
            exit 0
          fi
          git commit -m "chore: refresh price/stock from Cyberbiz [skip ci]"
          # Race-safe push: a concurrent/scheduled run (or any push to main) can
          # advance the remote between checkout and push, which rejects a plain
          # `git push` (non-fast-forward). Rebase our regenerated data onto the
          # latest main and retry. If our data is identical to what landed first,
          # the rebased commit becomes empty and the push is a no-op.
          n=0
          until git push; do
            n=$((n + 1))
            if [ "$n" -ge 5 ]; then
              echo "::error::push still rejected after $n attempts"
              exit 1
            fi
            echo "Push rejected (attempt $n); rebasing onto latest origin/main..."
            git pull --rebase -X theirs origin main
          done
