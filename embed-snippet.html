<!-- ===== CarMall 雨刷快速查詢 — 貼進 Cyberbiz 部落格文章的 HTML 區塊 ===== -->
<!-- 部署後把 src 換成實際 GitHub Pages 網址 -->
<div id="carmall-wiper-finder" style="max-width:680px;margin:0 auto;">
  <iframe id="cmw-frame"
    src="https://YOUR_GH_USERNAME.github.io/carmall-wiper-finder/"
    style="width:100%;border:0;display:block;min-height:560px;"
    title="雨刷快速查詢" loading="lazy" scrolling="no"></iframe>
</div>
<script>
(function () {
  window.addEventListener("message", function (e) {
    if (e && e.data && e.data.type === "carmallWiperHeight") {
      var f = document.getElementById("cmw-frame");
      if (f && e.data.height) f.style.height = (e.data.height + 8) + "px";
    }
  });
})();
</script>
